name: "Release docker image"

on:
  push:
    branches: ["main"]
    paths: 
      - "src/**"
      - "containers/**"
      - ".github/.release-please-manifest.json"
      - "CHANGELOG.md"

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write
  actions: write
  pull-requests: read
env:
  GHCR_REGISTRY: ghcr.io
  GHCR_REGISTRY_REPO: dedsxc

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release-please.outputs.paths_released }}
      releases_created: ${{ steps.release-please.outputs.releases_created }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIV_KEY }}"
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release-please
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  release-docker-image:
    name: Release docker image
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.paths_released != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        containers: ["mcp-openmemory"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      
      - name: Get repository name
        id: get_repo_name
        run: |
          result=$(echo "$GITHUB_REPOSITORY" | awk -F'/' '{print $2}')
          echo "repo_name=$result" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      
      - name: Configure Docker
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: dedsxc
          password: ${{ secrets.CI_BOT_TOKEN }}

      - name: Build-Push image
        run: |
          app_version=$(cat .github/.release-please-manifest.json | jq -r --arg key "." '.[$key]')
          platform=$(cat ./containers/${{ matrix.containers }}/PLATFORM)
          container_name=${{ matrix.containers }}
          docker buildx build --push --platform $platform -t ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REGISTRY_REPO }}/$container_name:$app_version -f ./containers/$container_name/Dockerfile .
